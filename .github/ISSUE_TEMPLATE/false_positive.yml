name: False positive report
description: Report a finding that appears incorrect or too noisy.
title: "[False positive]: "
labels:
  - false-positive
  - rules
body:
  - type: textarea
    id: config
    attributes:
      label: Minimal config snippet
      description: Include the smallest config snippet that reproduces the finding. Do not include real secrets.
      render: json
    validations:
      required: true
  - type: input
    id: rule
    attributes:
      label: Rule ID
      placeholder: XONE001
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual finding
      description: Paste the redacted finding, including fingerprint if available.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Explain whether the finding should disappear, change severity, or improve its remediation.
    validations:
      required: true
  - type: textarea
    id: why-safe
    attributes:
      label: Why this configuration is acceptable
      description: Describe the operational context and compensating controls.
    validations:
      required: true
